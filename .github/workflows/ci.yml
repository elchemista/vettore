name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  elixir:
    name: Elixir and integration tests
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: test
      VETTORE_BUILD: "1"

    steps:
      - name: Checkout source
        uses: actions/checkout@v7.0.1

      - name: Install Erlang and Elixir
        uses: erlef/setup-beam@v1.24.1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Mix and model downloads
        uses: actions/cache@v6.1.0
        with:
          path: |
            deps
            ~/.cache/rustler_precompiled
            ~/.cache/huggingface
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'native/vettore/Cargo.lock') }}

      - name: Install Mix tooling and dependencies
        env:
          VETTORE_TEST_EX_FASTEMBED: "1"
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --locked

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile project
        env:
          VETTORE_TEST_EX_FASTEMBED: "1"
        run: mix compile

      - name: Run tests and enforce coverage
        env:
          VETTORE_TEST_EX_FASTEMBED: "1"
        run: mix test --cover

      - name: Preflight every search-mode benchmark
        env:
          VETTORE_BENCH_DIMENSIONS: "16"
          VETTORE_BENCH_BATCH: "64"
          VETTORE_BENCH_LIMIT: "5"
          VETTORE_BENCH_CANDIDATES: "32"
          VETTORE_BENCH_TIME: "1"
          VETTORE_BENCH_WARMUP: "0"
        run: mix run bench/search_modes_bench.exs

      - name: Run Credo
        run: mix credo --strict

      - name: Run Dialyzer
        env:
          MIX_ENV: dev
        run: mix dialyzer

      - name: Build documentation
        env:
          MIX_ENV: dev
        run: mix docs

      - name: Verify Hex package contents
        env:
          MIX_ENV: dev
        run: mix hex.build

  rust:
    name: Rust unit tests and lints
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: native/vettore

    steps:
      - name: Checkout source
        uses: actions/checkout@v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install Rust coverage tooling
        uses: taiki-e/install-action@v2.84.0
        with:
          tool: cargo-llvm-cov@0.8.6
          fallback: none

      - name: Cache Cargo
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/vettore/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/vettore/Cargo.lock') }}

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Rust tests
        run: cargo test --locked

      - name: Verify supported NIF feature builds
        run: |
          cargo check --locked --no-default-features --features nif_version_2_15
          cargo check --locked --no-default-features --features nif_version_2_16

      - name: Enforce Rust algorithm coverage
        run: cargo llvm-cov --all-features --ignore-filename-regex 'src/nifs\.rs' --summary-only --fail-under-lines 98

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
